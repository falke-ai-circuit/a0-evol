<html>
<head>
  <title>EVOL Plugin Settings</title>
  <script type="module">
    import { store } from "/components/plugins/plugin-settings-store.js";
  </script>
</head>
<body>
  <div x-data>
    <div class="form-group">
      <label>Enable EVOL</label>
      <input type="checkbox" x-model="config.enabled" />
    </div>
    <div class="form-group">
      <label>Edit Mode</label>
      <select x-model="config.edit_mode">
        <option value="auto">auto</option>
        <option value="suggested">suggested</option>
        <option value="readonly">readonly</option>
      </select>
    </div>
    <div class="form-group">
      <label>Cycle Cooldown (minutes)</label>
      <input type="number" x-model="config.cooldown_minutes" />
    </div>
    <div class="form-group">
      <label>Express Cooldown (hours)</label>
      <input type="number" x-model="config.express_cooldown_hours" />
    </div>
    <div class="form-group">
      <label>Reflect Threshold (absorb counts)</label>
      <input type="number" x-model="config.phase_triggers.reflect" />
    </div>
    <div class="form-group">
      <label>Ollama API Key</label>
      <input type="password" x-model="config.ollama_api_key" />
    </div>
    <div class="form-group">
      <label>Venice API Key</label>
      <input type="password" x-model="config.venice_api_key" />
    </div>
  </div>
</body>
</html>
